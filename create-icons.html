<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Générateur d'icônes — MonAmour PWA</title>
<style>
  body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 40px 20px; }
  h1 { color: #C9A84C; margin-bottom: 10px; }
  p { color: #aaa; margin-bottom: 30px; }
  canvas { display: none; }
  .btn { display: inline-block; margin: 10px; padding: 14px 30px; background: #8B0000; color: #C9A84C; border: 1px solid #C9A84C; cursor: pointer; font-size: 16px; border-radius: 4px; text-decoration: none; }
  .btn:hover { background: #C8536A; }
  .status { margin-top: 20px; color: #C8536A; font-size: 14px; }
  .preview { margin: 20px auto; }
  .preview img { border: 2px solid #C9A84C; margin: 10px; border-radius: 8px; }
</style>
</head>
<body>
<h1>✦ Générateur d'icônes MonAmour ✦</h1>
<p>Ouvrez cette page dans votre navigateur.<br>Cliquez sur les boutons pour télécharger les icônes PNG.<br>Placez-les dans le dossier <strong>icons/</strong> de votre projet.</p>

<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>

<div>
  <button class="btn" onclick="generate(192)">⬇ Télécharger icon-192.png</button>
  <button class="btn" onclick="generate(512)">⬇ Télécharger icon-512.png</button>
  <button class="btn" onclick="generateAll()">⬇ Télécharger les deux</button>
</div>

<div class="preview" id="preview"></div>
<div class="status" id="status"></div>

<script>
function drawIcon(ctx, size) {
  const s = size;
  const r = s * 0.156; // border-radius proportionnel

  // Fond arrondi
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  // Fond dégradé
  const bg = ctx.createRadialGradient(s * 0.3, s * 0.3, 0, s * 0.5, s * 0.5, s * 0.7);
  bg.addColorStop(0, '#5C1A2E');
  bg.addColorStop(1, '#1A0A0F');
  ctx.fillStyle = bg;
  ctx.fill();

  // Cadre doré
  ctx.strokeStyle = 'rgba(201,168,76,0.5)';
  ctx.lineWidth = s * 0.006;
  ctx.stroke();

  // Cadre intérieur
  const margin = s * 0.047;
  ctx.beginPath();
  ctx.roundRect(margin, margin, s - margin * 2, s - margin * 2, r * 0.8);
  ctx.strokeStyle = 'rgba(201,168,76,0.3)';
  ctx.lineWidth = s * 0.002;
  ctx.stroke();

  // Cœur
  const cx = s / 2;
  const cy = s * 0.47;
  const hw = s * 0.28;

  ctx.beginPath();
  // Cœur gauche
  ctx.moveTo(cx, cy + hw * 0.8);
  ctx.bezierCurveTo(cx - hw * 1.4, cy + hw * 0.2, cx - hw * 1.4, cy - hw * 0.6, cx - hw * 0.7, cy - hw * 0.6);
  ctx.bezierCurveTo(cx - hw * 0.35, cy - hw * 0.6, cx - hw * 0.1, cy - hw * 0.35, cx, cy - hw * 0.05);
  // Cœur droit
  ctx.bezierCurveTo(cx + hw * 0.1, cy - hw * 0.35, cx + hw * 0.35, cy - hw * 0.6, cx + hw * 0.7, cy - hw * 0.6);
  ctx.bezierCurveTo(cx + hw * 1.4, cy - hw * 0.6, cx + hw * 1.4, cy + hw * 0.2, cx, cy + hw * 0.8);
  ctx.closePath();

  // Remplissage rose avec glow
  ctx.shadowColor = '#C8536A';
  ctx.shadowBlur = s * 0.08;
  const heartGrad = ctx.createLinearGradient(cx - hw, cy - hw * 0.6, cx + hw, cy + hw * 0.8);
  heartGrad.addColorStop(0, '#E0607A');
  heartGrad.addColorStop(1, '#8B0000');
  ctx.fillStyle = heartGrad;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Contour or du cœur
  ctx.strokeStyle = 'rgba(201,168,76,0.6)';
  ctx.lineWidth = s * 0.004;
  ctx.stroke();

  // Texte "MonAmour"
  ctx.shadowColor = 'rgba(201,168,76,0.4)';
  ctx.shadowBlur = s * 0.03;
  ctx.fillStyle = '#C9A84C';
  ctx.font = `italic ${s * 0.09}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.letterSpacing = `${s * 0.006}px`;
  ctx.fillText('MonAmour', cx, s * 0.88);
  ctx.shadowBlur = 0;

  // Ligne décorative sous le texte
  ctx.strokeStyle = 'rgba(201,168,76,0.3)';
  ctx.lineWidth = s * 0.002;
  ctx.beginPath();
  ctx.moveTo(s * 0.25, s * 0.82);
  ctx.lineTo(s * 0.75, s * 0.82);
  ctx.stroke();

  // Ornements coins
  const ornSize = s * 0.06;
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = `${ornSize}px sans-serif`;
  ctx.fillText('✦', s * 0.14, s * 0.16);
  ctx.fillText('✦', s * 0.86, s * 0.16);
}

function generate(size) {
  const canvas = document.getElementById(`c${size}`);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);

  // roundRect polyfill
  if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
      this.beginPath();
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      this.closePath();
    };
  }

  drawIcon(ctx, size);

  // Téléchargement
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `icon-${size}.png`;
    a.click();
    URL.revokeObjectURL(url);

    // Aperçu
    const img = document.createElement('img');
    img.src = canvas.toDataURL();
    img.width = size > 200 ? 128 : size;
    img.height = size > 200 ? 128 : size;
    img.title = `icon-${size}.png`;
    document.getElementById('preview').appendChild(img);

    document.getElementById('status').textContent = `✓ icon-${size}.png téléchargé ! Placez-le dans le dossier icons/`;
  }, 'image/png');
}

function generateAll() {
  generate(192);
  setTimeout(() => generate(512), 500);
}

// Aperçu au chargement
window.addEventListener('load', () => {
  [192, 512].forEach(size => {
    const canvas = document.getElementById(`c${size}`);
    const ctx = canvas.getContext('2d');
    if (!ctx.roundRect) {
      ctx.roundRect = function(x, y, w, h, r) {
        this.beginPath();
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
      };
    }
    drawIcon(ctx, size);
  });
  document.getElementById('status').textContent = 'Icônes prêtes — cliquez pour télécharger.';
});
</script>
</body>
</html>
